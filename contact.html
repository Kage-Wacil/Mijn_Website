<html lang="nl-BE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- JavaScript: Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
      defer
    ></script>
    <!-- eigen geschreven css voor jouw html-bestand -->
    <link href="./Css/style.css" rel="stylesheet" />
  </head>
  <body id="Contact">
    <!-- Navigatie -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img src="Assets/Website.logo.png" height="150" />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="project.html">Projecten</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="portfolio.html">Overzicht</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container my-5" id="Form">
      <div class="row">
        <!-- LINKERKANT: FORMULIER -->
        <div class="col-md-6">
          <h3 class="mb-4">Neem contact op</h3>

          <form>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Naam" />
            </div>

            <div class="mb-3">
              <input
                type="email"
                class="form-control"
                placeholder="E-mailadres"
              />
            </div>

            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Telefoonnummer (optioneel)"
              />
            </div>

            <div class="mb-3">
              <textarea
                class="form-control"
                rows="4"
                placeholder="Bericht"
              ></textarea>
            </div>

            <button class="btn btn-secondary w-100">Verzend</button>
          </form>
        </div>

        <!-- RECHTERKANT -->
        <div class="col-md-6">
          <!-- Kaart -->
          <div class="mb-4">
            <img src="#" class="img-fluid rounded" alt="map" />
          </div>

          <!-- Social icons -->
          <div class="d-flex gap-3 mb-4">
            <button class="btn btn-secondary">
              <i class="bi bi-facebook"></i>
            </button>
            <button class="btn btn-secondary">
              <i class="bi bi-linkedin"></i>
            </button>
            <button class="btn btn-secondary">
              <i class="bi bi-instagram"></i>
            </button>
          </div>

          <!-- Contact info -->
          <h5>Neem contact op</h5>

          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-globe me-2"></i>
            <span>wacilelmassoudi05@gmail.com</span>
          </div>

          <div class="d-flex align-items-center">
            <i class="bi bi-telephone me-2"></i>
            <span>04 85 87 14 01</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
